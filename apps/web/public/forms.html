<!doctype html>
<html lang="en">
  <body>
    <form name="quote-request" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="quote-request" />
      <input name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="city" />
      <select name="projectType">
        <option value="Floor tile">Floor tile</option>
        <option value="Shower or bathroom">Shower or bathroom</option>
        <option value="Backsplash">Backsplash</option>
        <option value="Repair or prep">Repair or prep</option>
        <option value="Other">Other</option>
      </select>
      <select name="timeline">
        <option value="As soon as possible">As soon as possible</option>
        <option value="This month">This month</option>
        <option value="Planning ahead">Planning ahead</option>
      </select>
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
